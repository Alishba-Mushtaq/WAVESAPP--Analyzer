<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVESAPP Analyzer — Sign In</title>
<style>
  :root{
    --bg:#04091A;--s1:#081426;--s2:#0C1B30;--s3:#101F35;--s4:#162440;
    --accent:#F97316;--teal:#06B6D4;--green:#22C55E;--red:#EF4444;
    --text:#F1F5F9;--sub:#8398B0;--dim:#2D3E52;--border:rgba(249,115,22,0.1);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Consolas,monospace;
    --r:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:var(--bg);color:var(--text);font-family:var(--font);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(ellipse 1000px 500px at 70% -100px,rgba(249,115,22,0.07),transparent),
                      radial-gradient(ellipse 800px 400px at 10% 100%,rgba(6,182,212,0.05),transparent);
  }
  .card{
    width:100%;max-width:380px;background:var(--s1);
    border:1px solid var(--border);border-radius:var(--r);
    padding:36px 32px 32px;position:relative;overflow:hidden;
  }
  .card::before{
    content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--accent),var(--teal));
  }
  .logo{
    width:44px;height:44px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),#dc5f00);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#fff;font-size:15px;font-family:var(--mono);
    margin-bottom:18px;
  }
  .eyebrow{
    font-family:var(--mono);font-size:10px;color:var(--teal);
    letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;
  }
  h1{font-size:21px;font-weight:700;color:#fff;letter-spacing:-.3px;margin-bottom:6px;}
  .sub{font-size:13px;color:var(--sub);line-height:1.5;margin-bottom:26px;}
  label{
    display:block;font-family:var(--mono);font-size:10px;color:var(--sub);
    text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;
  }
  .field{margin-bottom:16px;}
  input{
    width:100%;background:var(--s2);border:1px solid var(--dim);
    border-radius:8px;padding:11px 13px;color:var(--text);
    font-family:var(--font);font-size:14px;outline:none;
    transition:border-color .15s ease;
  }
  input:focus{border-color:var(--accent);}
  input::placeholder{color:#445873;}
  button{
    width:100%;background:linear-gradient(135deg,var(--accent),#dc5f00);
    border:none;border-radius:8px;padding:13px;color:#fff;
    font-family:var(--font);font-size:14px;font-weight:700;
    cursor:pointer;margin-top:6px;transition:opacity .15s ease,transform .1s ease;
  }
  button:hover{opacity:.92;}
  button:active{transform:scale(0.99);}
  button:disabled{opacity:.6;cursor:not-allowed;}
  .err{
    display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);
    color:var(--red);font-size:12.5px;border-radius:8px;padding:10px 12px;margin-bottom:14px;
  }
  .foot{
    margin-top:20px;font-family:var(--mono);font-size:10px;color:var(--dim);
    text-align:center;letter-spacing:.5px;
  }
  .spinner{
    width:14px;height:14px;border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;display:inline-block;
    vertical-align:middle;margin-right:8px;animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion:reduce){.spinner{animation:none;}}
</style>
</head>
<body>

<div class="card">
  <div class="logo">W</div>
  <div class="eyebrow">PSX: WAVESAPP</div>
  <h1>Access the Analyzer</h1>
  <p class="sub">Enter your name and email to continue to the Waves Home Appliances investment dashboard.</p>

  <div class="err" id="errBox">Something went wrong. Please check your details and try again.</div>

  <form id="gateForm">
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your full name" required>
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <button type="submit" id="submitBtn">Continue to Dashboard</button>
  </form>

  <div class="foot">SECURE SIGN-IN · WAVESAPP ANALYZER</div>
</div>

<script>
  const DASHBOARD_URL = "https://alishba-mushtaq.github.io/WAVESAPP--Analyzer/dashboard/index.html";
  
  // NOTE: If you recreate or save a new version of your Google Apps Script, 
  // verify that this URL matches your newly generated Web App Executable link.
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYE1ezktllAIZCplKY1KiPwHD84yfmdf8foRX83oveTh2K1MoCwMICvVxBGw-xe-1N/exec";

  const form = document.getElementById("gateForm");
  const btn = document.getElementById("submitBtn");
  const errBox = document.getElementById("errBox");

  form.addEventListener("submit", function(e){
    e.preventDefault();
    errBox.style.display = "none";

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();

    if(!name || !email){
      errBox.textContent = "Please fill in both fields.";
      errBox.style.display = "block";
      return;
    }

    // visual fallback & layout security state
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in...';

    // Pack data explicitly into expected script payload parameters
    const formData = new FormData();
    formData.append("name", name);
    formData.append("email", email);

    // Asynchronous network transmission bypassing local document structures
    fetch(SCRIPT_URL, {
      method: "POST",
      body: formData,
      mode: "no-cors" // Required strategy to prevent cross-origin blocks from Apps Script
    })
    .then(() => {
      // Data delivered safely. Redirect to the core system profile page.
      window.location.href = DASHBOARD_URL;
    })
    .catch((err) => {
      console.error("Transmission error: ", err);
      btn.disabled = false;
      btn.textContent = "Continue to Dashboard";
      errBox.textContent = "Network error. Please try again.";
      errBox.style.display = "block";
    });
  });
</script>

</body>
</html>
